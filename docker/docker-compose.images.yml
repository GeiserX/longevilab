# Docker Compose configuration using pre-built images from GitHub Container Registry
# Use this for quick deployment without building locally
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Run: docker compose -f docker-compose.images.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: longevilab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bloodwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloodwork}
      POSTGRES_DB: ${POSTGRES_DB:-bloodwork}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloodwork} -d ${POSTGRES_DB:-bloodwork}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: longevilab-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: ghcr.io/gianniskotsas/longevilab-worker:latest
    container_name: longevilab-migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bloodwork}:${POSTGRES_PASSWORD:-bloodwork}@postgres:5432/${POSTGRES_DB:-bloodwork}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "db:migrate"]
    restart: "no"

  seed:
    image: ghcr.io/gianniskotsas/longevilab-worker:latest
    container_name: longevilab-seed
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bloodwork}:${POSTGRES_PASSWORD:-bloodwork}@postgres:5432/${POSTGRES_DB:-bloodwork}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["pnpm", "db:seed"]
    restart: "no"

  app:
    image: ghcr.io/gianniskotsas/longevilab:latest
    container_name: longevilab-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-bloodwork}:${POSTGRES_PASSWORD:-bloodwork}@postgres:5432/${POSTGRES_DB:-bloodwork}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATALAB_API_KEY: ${DATALAB_API_KEY:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

  worker:
    image: ghcr.io/gianniskotsas/longevilab-worker:latest
    container_name: longevilab-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-bloodwork}:${POSTGRES_PASSWORD:-bloodwork}@postgres:5432/${POSTGRES_DB:-bloodwork}
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      DATALAB_API_KEY: ${DATALAB_API_KEY:-}
      TESSERACT_LANGS: ${TESSERACT_LANGS:-eng+spa}
      OCR_WORKER_CONCURRENCY: ${OCR_WORKER_CONCURRENCY:-5}
      LLM_WORKER_CONCURRENCY: ${LLM_WORKER_CONCURRENCY:-3}
      HEALTH_EXPORT_WORKER_CONCURRENCY: ${HEALTH_EXPORT_WORKER_CONCURRENCY:-1}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
