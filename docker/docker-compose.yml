version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bloodwork-postgres
    environment:
      POSTGRES_USER: bloodwork
      POSTGRES_PASSWORD: bloodwork
      POSTGRES_DB: bloodwork
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloodwork -d bloodwork"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bloodwork-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
